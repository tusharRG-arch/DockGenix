<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
{{robots}}
{{canonical}}
  <meta name="theme-color" content="#081321">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:url" content="{{ogUrl}}">
  <meta property="og:image" content="https://dockgenix.in/assets/dockgenix_logo.png">
  <meta property="og:image:alt" content="DockGenix company logo">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="563">
  <meta property="og:image:height" content="563">
  <meta property="og:site_name" content="DockGenix">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{title}}">
  <meta name="twitter:description" content="{{description}}">
  <meta name="twitter:image" content="https://dockgenix.in/assets/dockgenix_logo.png">
  <link rel="icon" href="/assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preload" href="/assets/fonts/inter-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/styles.css">
{{schema}}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  {{header}}
  <main id="main-content">
    {{content}}
  </main>
  {{footer}}
  <script src="/script.js" defer></script>
</body>
</html>
